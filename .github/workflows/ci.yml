name: Python CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Кодты жүктеу
        uses: actions/checkout@v4

      - name: Python орнату
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Қажетті кітапханаларды орнату
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: flake8 тексеруі
        run: |
          flake8 .

      - name: pylint тексеруі
        run: |
          pylint app.py

      - name: Тесттерді іске қосу
        run: |
          python -m unittest discover